events {}

http {
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        root /usr/share/nginx/html;
        listen 7860;

        # New mapping for code-server on port 9001
        location /vs-code {
            proxy_pass http://127.0.0.1:9001;

            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Reuses your global map for clean WebSocket fallback
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Extended timeouts to prevent terminal or file sync disconnects
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
            
            # Disable buffering for instant UI rendering and terminal responsiveness
            proxy_buffering off;
        }

        location /terminal {
            proxy_pass http://127.0.0.1:8000;

            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }
        location / {
            proxy_pass http://127.0.0.1:3000;

            proxy_http_version 1.1;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Added WebSocket support
            proxy_set_header Sec-WebSocket-Key $http_sec_websocket_key;
            proxy_set_header Sec-WebSocket-Version $http_sec_websocket_version;
            proxy_set_header Sec-WebSocket-Extensions $http_sec_websocket_extensions;

            ############################################################################
             # Jenkins reverse proxy required headers
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port 443;

            # Rewrite Location headers Jenkins sends on redirects
            proxy_redirect http://127.0.0.1:3000 https://$host;
            proxy_redirect http://127.0.0.1:3000/ https://$host/;

            proxy_read_timeout 120;
            proxy_send_timeout 120;
            proxy_connect_timeout 120;
            ############################################################################



            # Improve performance of this reverse proxy
            proxy_buffering off;

        }
    }
}
